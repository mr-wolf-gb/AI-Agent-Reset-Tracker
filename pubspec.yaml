name: agent_vault
description: AgentVault - Track and manage your AI tool free trial accounts
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Local database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Secure storage
  flutter_secure_storage: ^9.2.2

  # Notifications
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  flutter_timezone: ^2.0.0

  # Biometrics
  local_auth: ^2.3.0

  # Networking
  dio: ^5.7.0

  # Navigation
  go_router: ^14.2.7

  # Image caching
  cached_network_image: ^3.4.1

  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.3.1
  package_info_plus: ^8.1.1
  path_provider: ^2.1.4
  uuid: ^4.5.1
  permission_handler: ^11.3.1
  connectivity_plus: ^6.1.0
  timeago: ^3.7.0
  open_filex: ^4.5.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/images/
